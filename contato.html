<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Contato - Pizzaria</title>

    <link rel="stylesheet" href="pizzaria_style.css">

</head>

<body>

    <!-- HEADER -->

    <header>

        <div>
            <p>Pizzaria</p>
        </div>

        <nav>

            <ul>

                <li>
                    <a href="pizzaria_wireframe.html">
                        Home
                    </a>
                </li>

                <li>
                    <a href="#">
                        Menu
                    </a>
                </li>

                <li>
                    <a href="contato.html">
                        Contato
                    </a>
                </li>

            </ul>

        </nav>

    </header>

    <!-- MAIN -->

    <main class="pagina-contato">

        <section class="contato-container">

            <div class="contato-texto">

                <h1>Fale Conosco</h1>

                <p>
                    Tem alguma dúvida, sugestão ou deseja fazer um pedido especial?
                    Envie sua mensagem para nossa equipe                 </p>

            </div>

            <!-- FORMULÁRIO -->

            <form id="form-contato">

                <!-- NOME -->

                <div class="campo-formulario">

                    <label for="nome">
                        Nome
                    </label>

                    <input
                        type="text"
                        id="nome"
                        placeholder="Digite seu nome"
                    >

                    <small class="erro" id="erro-nome"></small>

                </div>

                <!-- EMAIL -->

                <div class="campo-formulario">

                    <label for="email">
                        E-mail
                    </label>

                    <input
                        type="text"
                        id="email"
                        placeholder="Digite seu e-mail"
                    >

                    <small class="erro" id="erro-email"></small>

                </div>

                <!-- MENSAGEM -->

                <div class="campo-formulario">

                    <label for="mensagem">
                        Mensagem
                    </label>

                    <textarea
                        id="mensagem"
                        rows="6"
                        placeholder="Digite sua mensagem"
                    ></textarea>

                    <small class="erro" id="erro-mensagem"></small>

                </div>

                <!-- BOTÃO -->

                <button type="submit" class="btn-enviar">

                    Enviar Mensagem

                </button>

            </form>

        </section>

    </main>

    <!-- FOOTER -->

    <footer>

        <p>© 2026 Pizzaria</p>

    </footer>

    <!-- JS -->

    <script src="contato.js"></script>

</body>

</html>
